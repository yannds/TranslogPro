<!DOCTYPE html>
<html lang="fr" class="">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TranslogPro</title>

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

  <!--
    Anti-FOUC : applique 'dark' sur <html> AVANT le premier paint React.
    Lit localStorage('translog-theme') — si 'dark' ou 'system' + prefers-color-scheme:dark.
  -->
  <script>
    (function() {
      try {
        var t = localStorage.getItem('translog-theme') || 'system';
        var d = window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (t === 'dark' || (t === 'system' && d)) {
          document.documentElement.classList.add('dark');
        }
      } catch(e) {}
    })();
  </script>
</head>
<body class="bg-white dark:bg-slate-950 text-slate-900 dark:text-slate-50">
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
