<!DOCTYPE html>
<html lang="fr" class="">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="x-dns-prefetch-control" content="off" />
  <meta name="referrer" content="no-referrer" />
  <title>TranslogPro</title>

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

  <!--
    Theme: lire localStorage, sinon dark pour l'admin, light pour le portail public.
    Le portail public (/p/*) s'affiche en light par défaut.
  -->
  <script>
    (function(){
      var t = localStorage.getItem('translog-theme');
      if (t === 'light') { document.documentElement.classList.add('light'); }
      else if (t === 'dark') { document.documentElement.classList.add('dark'); }
      else if (location.pathname.startsWith('/p/')) { document.documentElement.classList.add('light'); }
      else { document.documentElement.classList.add('dark'); }
    })();
  </script>
</head>
<body class="bg-white dark:bg-slate-950 text-slate-900 dark:text-slate-50">
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
