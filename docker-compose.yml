version: '3.9'

# ─────────────────────────────────────────────────────────────
# TransLog Pro — Docker Compose (Développement)
# ─────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL + PostGIS ──────────────────────────────────
  postgres:
    image: postgis/postgis:16-3.4
    container_name: translog-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: translog
      POSTGRES_USER: app_user
      POSTGRES_PASSWORD: app_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/sql/01-rls.sql:/docker-entrypoint-initdb.d/01-rls.sql
      - ./infra/sql/02-indexes.sql:/docker-entrypoint-initdb.d/02-indexes.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app_user -d translog"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - translog-net

  # ── PgBouncer (SESSION mode — obligatoire pour RLS) ───────
  pgbouncer:
    image: pgbouncer/pgbouncer:1.22
    container_name: translog-pgbouncer
    restart: unless-stopped
    environment:
      DATABASES_HOST: postgres
      DATABASES_PORT: 5432
      DATABASES_DBNAME: translog
      DATABASES_USER: app_user
      DATABASES_PASSWORD: app_password
      POOL_MODE: session
      MAX_CLIENT_CONN: 200
      DEFAULT_POOL_SIZE: 20
      SERVER_RESET_QUERY: DISCARD ALL
      AUTH_TYPE: plain
    ports:
      - "5433:5432"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - translog-net

  # ── Redis ─────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: translog-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass redis_password
      --save 60 1
      --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis_password", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - translog-net

  # ── HashiCorp Vault (dev mode) ────────────────────────────
  vault:
    image: hashicorp/vault:1.16
    container_name: translog-vault
    restart: unless-stopped
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: dev-root-token
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
      VAULT_ADDR: http://127.0.0.1:8200
    ports:
      - "8200:8200"
    volumes:
      - ./infra/vault/init.sh:/vault/init.sh:ro
      - vault_data:/vault/data
    healthcheck:
      test: ["CMD", "vault", "status"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - translog-net

  # ── Vault Init (one-shot) ─────────────────────────────────
  vault-init:
    image: hashicorp/vault:1.16
    container_name: translog-vault-init
    restart: "no"
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: dev-root-token
    volumes:
      - ./infra/vault/init.sh:/init.sh:ro
    command: sh /init.sh
    depends_on:
      vault:
        condition: service_healthy
    networks:
      - translog-net

  # ── MinIO (Object Storage) ────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: translog-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - translog-net

  # ── NestJS API (développement avec hot reload) ────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: translog-api
    restart: unless-stopped
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: dev-root-token
      NODE_ENV: development
      # Les autres variables viennent de Vault via ISecretService
      # En dev, le vault-init les charge automatiquement
    volumes:
      - ./src:/app/src:ro
      - ./prisma:/app/prisma:ro
    ports:
      - "3000:3000"   # REST API
      - "3001:3001"   # WebSocket Gateway
      - "9229:9229"   # Debug
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      vault:
        condition: service_healthy
      vault-init:
        condition: service_completed_successfully
    networks:
      - translog-net

  # ── Nginx (Reverse Proxy) ─────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: translog-nginx
    restart: unless-stopped
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - api
    networks:
      - translog-net

# ─────────────────────────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:
  minio_data:
  vault_data:

networks:
  translog-net:
    driver: bridge
