# ─────────────────────────────────────────────────────────────
# TransLog Pro — Docker Compose (Développement)
# ─────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL + PostGIS ──────────────────────────────────
  # platform: linux/amd64 → image multi-arch stable, Rosetta 2 sur Apple Silicon
  # Sur arm64 natif : postgis/postgis:16-3.4 n'a pas de manifest arm64 officiel.
  # Rosetta 2 (Docker Desktop) gère l'émulation de façon transparente.
  # start_period 40s : laisse le temps à PG d'initialiser sous émulation.
  postgres:
    image: postgis/postgis:16-3.4
    platform: linux/amd64
    container_name: translog-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: translog
      POSTGRES_USER: app_user
      POSTGRES_PASSWORD: app_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/sql/01-rls.sql:/docker-entrypoint-initdb.d/01-rls.sql
      - ./infra/sql/02-indexes.sql:/docker-entrypoint-initdb.d/02-indexes.sql
      # 02-rls-new-tables.sql est appliqué par dev.sh APRÈS prisma migrate
      # (il dépend des tables créées par les migrations Prisma)
      - ./infra/sql/02-rls-new-tables.sql:/sql/02-rls-new-tables.sql:ro
    ports:
      - "5434:5432"   # 5432 déjà pris par PostgreSQL Homebrew local
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app_user -d translog"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 40s
    networks:
      - translog-net

  # ── PgBouncer (SESSION mode — obligatoire pour RLS) ───────
  # Image : edoburu/pgbouncer — pinning version explicite pour reproductibilité
  # (audit sécu : `latest` interdit en prod, CVE non traçables).
  pgbouncer:
    image: edoburu/pgbouncer:1.23.1
    container_name: translog-pgbouncer
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: translog
      DB_USER: app_user
      DB_PASSWORD: app_password
      POOL_MODE: session
      MAX_CLIENT_CONN: "200"
      DEFAULT_POOL_SIZE: "20"
      SERVER_RESET_QUERY: DISCARD ALL
      AUTH_TYPE: plain
      # Désactiver TLS en dev
      CLIENT_TLS_SSLMODE: disable
      SERVER_TLS_SSLMODE: disable
    ports:
      - "5433:5432"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - translog-net

  # ── Redis ─────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: translog-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass redis_password
      --save 60 1
      --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis_password", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - translog-net

  # ── HashiCorp Vault (dev mode) ────────────────────────────
  vault:
    image: hashicorp/vault:1.16
    container_name: translog-vault
    restart: unless-stopped
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: dev-root-token
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
      VAULT_ADDR: http://127.0.0.1:8200
    ports:
      - "8200:8200"
    volumes:
      - ./infra/vault/init.sh:/vault/init.sh:ro
      - vault_data:/vault/data
    healthcheck:
      test: ["CMD", "vault", "status"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - translog-net

  # ── Vault Init (one-shot) ─────────────────────────────────
  vault-init:
    image: hashicorp/vault:1.16
    container_name: translog-vault-init
    restart: "no"
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: dev-root-token
    volumes:
      - ./infra/vault/init.sh:/init.sh:ro
    command: sh /init.sh
    depends_on:
      vault:
        condition: service_healthy
    networks:
      - translog-net

  # ── MinIO (Object Storage) ────────────────────────────────
  # Pinning sur RELEASE stable explicite — `latest` peut casser l'API entre
  # majors (v1 → v2). Version vérifiée compatible avec @aws-sdk/client-s3.
  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    container_name: translog-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - translog-net

  # ── NestJS API (développement avec hot reload) ────────────
  # Non utilisé par dev.sh (l'API tourne sur l'hôte en hot-reload)
  # Disponible pour un lancement full-Docker via: docker compose up api
  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: translog-api
    restart: unless-stopped
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: dev-root-token
      NODE_ENV: development
    volumes:
      - ./src:/app/src:ro
      - ./prisma:/app/prisma:ro
    ports:
      - "3000:3000"   # REST API
      - "3001:3001"   # WebSocket Gateway
      - "9229:9229"   # Debug
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      vault:
        condition: service_healthy
      vault-init:
        condition: service_completed_successfully
    networks:
      - translog-net

  # ── Nginx SUPPRIMÉ — remplacé par Caddy (voir docker-compose.dev.yml /
  # docker-compose.prod.yml + infra/caddy/). L'ancien service nginx a été
  # retiré du compose de base pour éviter toute confusion et surface d'attaque
  # passive (2026-04-18 — post audit sécu).
  # Le fichier infra/nginx/nginx.conf reste en archive pour référence, mais
  # n'est plus monté ni lu par aucun service.

# ─────────────────────────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:
  minio_data:
  vault_data:

networks:
  translog-net:
    driver: bridge
