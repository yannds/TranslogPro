# ═══════════════════════════════════════════════════════════════════════════
# CI/CD — Build + Push GHCR + Deploy via SSH
# ═══════════════════════════════════════════════════════════════════════════
#
# Trigger :
#   - workflow_dispatch (manuel) → tous les déploiements importants
#   - push tags v*.*.*           → release officielle
#   - push main                  → auto-deploy (skip si commit "[skip deploy]")
#                                  Skip aussi si change uniquement docs/tests
#                                  via paths-ignore.
#
# Secrets GitHub à configurer (Settings → Secrets and variables → Actions) :
#   SSH_PRIVATE_KEY      Clé privée SSH (format OpenSSH) accès root@VPS
#   SSH_KNOWN_HOSTS      Output de `ssh-keyscan 72.61.108.160` (évite MITM)
#   VPS_HOST             72.61.108.160
#   VPS_USER             root
#   VPS_DEPLOY_PATH      /opt/TranslogPro
#   GHCR_TOKEN           PAT (ou GITHUB_TOKEN auto si repo public)
#   PLATFORM_BASE_DOMAIN translog.dsyann.info
#   PUBLIC_APP_URL       https://api.translog.dsyann.info
#
# Flux :
#   1. Checkout
#   2. Build images (api, web, caddy) avec build-args Vite
#   3. Push à ghcr.io/<owner>/translog_{api,web,caddy}:<tag>
#   4. SSH VPS : pull + docker stack deploy + healthcheck
# ═══════════════════════════════════════════════════════════════════════════

name: Deploy production

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag (default: short SHA)'
        required: false
        default: ''
  push:
    tags:
      - 'v*.*.*'
    branches:
      - main
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'reports/**'
      - 'test/playwright/**'
      - 'test/unit/**'
      - 'test/integration/**'
      - 'test/security/**'
      - 'test/e2e/**'
      - '.gitignore'

# Annule le run précédent si un nouveau push arrive — évite 2 deploys
# qui se piétinent sur le même VPS.
concurrency:
  group: deploy-prod-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_API: ${{ github.repository_owner }}/translog_api
  IMAGE_NAME_WEB: ${{ github.repository_owner }}/translog_web
  IMAGE_NAME_CADDY: ${{ github.repository_owner }}/translog_caddy

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "tag=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          fi

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      # ── Backend API ─────────────────────────────────────────────────────
      - name: Build & push API
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_API }}:${{ steps.tag.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_API }}:latest
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      # ── Frontend Web (Vite + nginx) ─────────────────────────────────────
      - name: Build & push Web
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile.prod
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_WEB }}:${{ steps.tag.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_WEB }}:latest
          build-args: |
            VITE_PLATFORM_BASE_DOMAIN=${{ secrets.PLATFORM_BASE_DOMAIN }}
            VITE_API_URL=${{ secrets.PUBLIC_APP_URL }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

      # ── Caddy custom (avec rfc2136) ──────────────────────────────────────
      - name: Build & push Caddy
        uses: docker/build-push-action@v5
        with:
          context: ./infra/prod/caddy
          file: ./infra/prod/caddy/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_CADDY }}:${{ steps.tag.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_CADDY }}:latest
          cache-from: type=gha,scope=caddy
          cache-to: type=gha,mode=max,scope=caddy

  deploy:
    needs: build-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Configure known_hosts
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Ensure target directories exist on VPS
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "mkdir -p ${{ secrets.VPS_DEPLOY_PATH }}/infra/prod ${{ secrets.VPS_DEPLOY_PATH }}/prisma/seeds ${{ secrets.VPS_DEPLOY_PATH }}/frontend"

      - name: Pre-flight validation Caddyfile + BIND9
        # Bloque le deploy si Caddyfile / named.conf / zone BIND9 ne valident
        # pas localement. Évite de pusher une config qui crash le runtime.
        run: |
          # Caddy validate (via image officielle, pas besoin du custom)
          docker run --rm -v "$(pwd)/infra/prod/caddy/Caddyfile:/etc/caddy/Caddyfile:ro" \
            caddy:2-alpine caddy validate --config /etc/caddy/Caddyfile 2>&1 | tail -5
          # BIND9 named-checkconf (image officielle)
          docker run --rm \
            -v "$(pwd)/infra/prod/bind9/named.conf:/etc/bind/named.conf:ro" \
            -v "$(pwd)/infra/prod/bind9/zones:/var/lib/bind:ro" \
            internetsystemsconsortium/bind9:9.20 \
            named-checkconf /etc/bind/named.conf 2>&1 | tail -3 || \
            { echo "::error::named.conf validation failed"; exit 1; }
          # docker-stack.prod.yml syntax (skip env vars qui sont sur VPS)
          docker compose -f infra/prod/docker-stack.prod.yml config --quiet 2>&1 | tail -5 || \
            { echo "::warning::docker-stack.prod.yml validation a des warnings (env vars manquantes en CI, normal)"; }

      - name: Drift check Caddyfile + BIND9 zone
        # Garde-fou : si quelqu'un a modifié Caddyfile ou zone BIND9 sur le VPS
        # sans sync dans le repo, le rsync va écraser ses modifs. On compare
        # les md5 AVANT le rsync et on log un warning si drift détecté.
        # Ne fait pas fail le deploy (le repo reste source de vérité), mais
        # alerte explicitement pour éviter les pertes silencieuses.
        run: |
          for f in caddy/Caddyfile bind9/zones/translog.db; do
            host_md5=$(ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "md5sum ${{ secrets.VPS_DEPLOY_PATH }}/infra/prod/$f 2>/dev/null | cut -d' ' -f1" || echo "")
            repo_md5=$(md5sum ./infra/prod/$f 2>/dev/null | cut -d' ' -f1 || echo "")
            if [ -n "$host_md5" ] && [ -n "$repo_md5" ] && [ "$host_md5" != "$repo_md5" ]; then
              echo "::warning::Drift détecté sur $f — VPS:$host_md5 vs repo:$repo_md5 (le rsync va écraser la version VPS)"
            fi
          done

      - name: Sync infra/prod (sans .env.prod)
        run: |
          rsync -avz --delete \
            --exclude='.env.prod' \
            --exclude='caddy/data/' \
            --exclude='caddy/config/' \
            --exclude='bind9/zones/*.jnl' \
            --exclude='bind9/zones/tsig.key' \
            ./infra/prod/ \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ secrets.VPS_DEPLOY_PATH }}/infra/prod/

      - name: Sync prisma seeds + schema
        run: |
          rsync -avz ./prisma/seeds/ \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ secrets.VPS_DEPLOY_PATH }}/prisma/seeds/
          rsync -avz ./prisma/schema.prisma \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ secrets.VPS_DEPLOY_PATH }}/prisma/

      - name: Sync Dockerfile + frontend env
        run: |
          rsync -avz ./Dockerfile \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ secrets.VPS_DEPLOY_PATH }}/
          rsync -avz ./frontend/.env.production ./frontend/.dockerignore ./frontend/Dockerfile.prod \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ secrets.VPS_DEPLOY_PATH }}/frontend/ 2>/dev/null || true

      - name: Diagnostic VPS (non-destructif — verifie .env.prod present)
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} <<EOF
            set +e  # ne pas planter sur les ls
            echo "═══ DIAGNOSTIC VPS ═══"
            echo "VPS_DEPLOY_PATH = ${{ secrets.VPS_DEPLOY_PATH }}"
            echo ""
            echo "── cd \${VPS_DEPLOY_PATH}/infra/prod"
            cd ${{ secrets.VPS_DEPLOY_PATH }}/infra/prod 2>&1
            pwd
            echo ""
            echo "── ls .env.prod :"
            ls -la .env.prod 2>&1 || echo "ABSENT depuis cd-target"
            echo ""
            echo "── ls -la racine du dir :"
            ls -la | head -30
            echo ""
            echo "── find autres .env.prod sur le systeme :"
            find /opt /root /home -maxdepth 5 -name '.env.prod' -type f 2>/dev/null | head -5
            echo "═══ FIN DIAGNOSTIC ═══"
          EOF

      - name: Pull images + redeploy stack
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} <<EOF
            set -euo pipefail
            cd ${{ secrets.VPS_DEPLOY_PATH }}/infra/prod

            # Login GHCR pour pull
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ${{ env.REGISTRY }} \
              -u ${{ github.actor }} --password-stdin

            # Pull les nouvelles images
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_API }}:${{ needs.build-push.outputs.tag }}
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_WEB }}:${{ needs.build-push.outputs.tag }}
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_CADDY }}:${{ needs.build-push.outputs.tag }}

            # Tag local pour matcher docker-stack.prod.yml
            docker tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_API }}:${{ needs.build-push.outputs.tag }} translog_api:1.0.0
            docker tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_WEB }}:${{ needs.build-push.outputs.tag }} translog_web:1.0.0
            docker tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_CADDY }}:${{ needs.build-push.outputs.tag }} prod-caddy:latest

            # Re-lance le script autonome avec SKIP_BUILD=1 (images viennent de GHCR)
            SKIP_BUILD=1 bash scripts/04-deploy.sh
          EOF

      - name: External healthcheck (smoke test post-deploy)
        run: |
          # Attente 30s pour que les services convergent post-deploy
          sleep 30
          FAIL=0
          for d in translog.dsyann.info admin.translog.dsyann.info api.translog.dsyann.info panel.dsyann.info; do
            for attempt in 1 2 3; do
              code=$(curl -kI -o /dev/null -w "%{http_code}" -m 10 "https://$d/?cb=$(date +%s%N)" || echo 000)
              if [ "$code" = "200" ] || [ "$code" = "404" ] || [ "$code" = "302" ] || [ "$code" = "301" ]; then
                echo "✔ https://$d/ → HTTP $code"
                break
              fi
              [ "$attempt" = "3" ] && { echo "::error::$d unhealthy après 3 tentatives (HTTP $code)"; FAIL=1; }
              sleep 5
            done
          done
          # Vérifier que DNS public résout encore
          for d in translog.dsyann.info api.translog.dsyann.info; do
            ip=$(dig +short A "$d" @8.8.8.8 +time=3 +tries=2 | head -1)
            if [ -z "$ip" ]; then
              echo "::error::DNS public ne résout plus $d (BIND9 cassé ?)"
              FAIL=1
            else
              echo "✔ DNS $d → $ip"
            fi
          done
          if [ "$FAIL" = "1" ]; then
            echo "::error::Smoke test post-deploy KO — rollback recommandé : bash /opt/TranslogPro/infra/prod/scripts/restore-good-state.sh latest"
            exit 1
          fi

      - name: Snapshot good-state si succès
        if: success()
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "cd ${{ secrets.VPS_DEPLOY_PATH }}/infra/prod && ./scripts/snapshot-good-state.sh deploy-${{ needs.build-push.outputs.tag }} 2>&1 | tail -10" || \
            echo "::warning::Snapshot good-state post-deploy a échoué (non bloquant)"

      - name: Notify success
        if: success()
        run: echo "::notice::Deploy ${{ needs.build-push.outputs.tag }} → production OK"
