events {
  worker_connections 1024;
}

http {
  upstream api_backend {
    server api:3000;
    keepalive 32;
  }

  upstream ws_backend {
    server api:3001;
  }

  # Rate limiting zones
  limit_req_zone $binary_remote_addr zone=api_global:10m rate=100r/s;
  limit_req_zone $binary_remote_addr zone=payment_webhook:1m rate=10r/s;

  server {
    listen 80;
    server_name _;

    # Security headers
    add_header X-Frame-Options "DENY";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # Request ID injection
    add_header X-Request-ID $request_id always;

    # ─── REST API ──────────────────────────────────────────────
    location /api/ {
      limit_req zone=api_global burst=50 nodelay;

      proxy_pass         http://api_backend;
      proxy_http_version 1.1;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Request-ID $request_id;
      proxy_read_timeout 30s;
    }

    # ─── Payment Webhooks (IP restricted) ────────────────────
    location /api/v1/tenants/payments/webhook {
      limit_req zone=payment_webhook burst=5;

      # Allow only Flutterwave/Paystack IPs
      # allow 52.0.0.0/8;   # Flutterwave IPs (example)
      # deny all;

      proxy_pass         http://api_backend;
      proxy_http_version 1.1;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
    }

    # ─── WebSocket Gateway ───────────────────────────────────
    location /socket.io/ {
      proxy_pass         http://ws_backend;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade $http_upgrade;
      proxy_set_header   Connection "upgrade";
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_read_timeout 3600s;
      proxy_send_timeout 3600s;
    }

    # ─── Health Check ─────────────────────────────────────────
    location /health {
      proxy_pass http://api_backend;
      access_log off;
    }
  }
}
