# ═════════════════════════════════════════════════════════════════════════════
# TransLog Pro — Stack production (VPS Hostinger, coexistence avec gmp/Easypanel)
# ═════════════════════════════════════════════════════════════════════════════
#
# Architecture :
#   - Caddy seul sur 80/443 (remplace Easypanel Traefik après cutover)
#   - BIND9 sur 53/udp+tcp (authoritative pour translog.dsyann.info)
#   - Stack TransLog isolée sur `translog_net`
#   - Caddy joint aussi `easypanel-gmp` (attachable) pour proxy vers gmp_*
#
# Lancement :
#   docker compose -f docker-compose.prod.yml --env-file .env.prod up -d
#
# Tous les secrets viennent de .env.prod (jamais commité).
# ═════════════════════════════════════════════════════════════════════════════

services:

  # ── BIND9 — DNS authoritative pour translog.dsyann.info ───────────────────
  bind9:
    image: internetsystemsconsortium/bind9:9.20
    container_name: translog_bind9
    restart: unless-stopped
    ports:
      - "53:53/udp"
      - "53:53/tcp"
    volumes:
      - ./bind9/named.conf:/etc/bind/named.conf:ro
      - ./bind9/zones:/var/lib/bind:rw
      - bind9_cache:/var/cache/bind
    # ENTRYPOINT image déjà "/usr/sbin/named" → on passe seulement les args.
    command: ["-g", "-c", "/etc/bind/named.conf"]
    networks:
      - translog_net
    healthcheck:
      test: ["CMD", "dig", "+short", "@127.0.0.1", "translog-admin.translog.dsyann.info"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Caddy — reverse proxy UNIQUE (80/443) avec plugin rfc2136 pour DNS-01 ──
  caddy:
    build:
      context: ./caddy
      dockerfile: Dockerfile
    container_name: translog_caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data      # Certs Let's Encrypt (CRITIQUE backup)
      - caddy_config:/config
      - caddy_logs:/var/log/caddy
    environment:
      TSIG_KEY_NAME:   ${TSIG_KEY_NAME}
      TSIG_SECRET:     ${TSIG_SECRET}
      TSIG_ALG:        ${TSIG_ALG:-hmac-sha256}
      ACME_EMAIL:      ${ACME_EMAIL}
    depends_on:
      bind9:
        condition: service_healthy
    networks:
      - translog_net
      - easypanel-gmp       # accès aux containers gmp_* en reverse proxy
      - easypanel           # accès au container easypanel (UI admin sur :3000)
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:2019/config/"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── PostgreSQL + PostGIS ──────────────────────────────────────────────────
  postgres:
    image: postgis/postgis:16-3.4
    container_name: translog_postgres
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/01-rls.sql:/docker-entrypoint-initdb.d/01-rls.sql:ro
      - ./postgres/02-roles.sql:/docker-entrypoint-initdb.d/02-roles.sql:ro
      - ./postgres/10-env.sh:/docker-entrypoint-initdb.d/10-env.sh:ro
    environment:
      POSTGRES_DB:       translog
      POSTGRES_USER:     app_admin
      POSTGRES_PASSWORD: ${POSTGRES_APP_ADMIN_PASSWORD}
      # Custom vars lues par 02-roles.sql via 10-env.sh :
      APP_RUNTIME_PASSWORD: ${POSTGRES_APP_RUNTIME_PASSWORD}
      APP_SUPERADMIN_PASSWORD: ${POSTGRES_APP_SUPERADMIN_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app_admin -d translog"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s
    networks:
      - translog_net

  # ── PgBouncer (SESSION mode obligatoire pour RLS SET LOCAL) ────────────────
  pgbouncer:
    image: edoburu/pgbouncer:v1.25.1-p0
    container_name: translog_pgbouncer
    restart: unless-stopped
    environment:
      DB_HOST:          postgres
      DB_PORT:          "5432"
      DB_NAME:          translog
      DB_USER:          app_runtime
      DB_PASSWORD:      ${POSTGRES_APP_RUNTIME_PASSWORD}
      POOL_MODE:        session
      MAX_CLIENT_CONN:  "200"
      DEFAULT_POOL_SIZE: "20"
      SERVER_RESET_QUERY: DISCARD ALL
      AUTH_TYPE:        plain
      CLIENT_TLS_SSLMODE: disable
      SERVER_TLS_SSLMODE: disable
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - translog_net

  # ── Redis (session, rate-limit, cache) ────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: translog_redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --save 60 1
      --appendonly yes
      --maxmemory 1gb
      --maxmemory-policy noeviction
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - translog_net

  # ── MinIO — Object storage tenant ─────────────────────────────────────────
  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    container_name: translog_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER:     ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BROWSER:       "off"     # console désactivée en prod (admin via CLI)
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - translog_net

  # ── Vault — secrets (mode raft backend prod) ──────────────────────────────
  vault:
    image: hashicorp/vault:1.16
    container_name: translog_vault
    restart: unless-stopped
    cap_add:
      - IPC_LOCK
    # Override entrypoint pour chown les volumes AVANT que docker-entrypoint.sh
    # ne drop les privilèges via su-exec vers UID 100 (vault user). Docker
    # Compose `user:` ne suffit pas car l'entrypoint Vault re-drop en interne.
    user: "0:0"
    entrypoint:
      - /bin/sh
      - -c
      - |
        chown -R vault:vault /vault/data /vault/logs 2>/dev/null || true
        exec /usr/local/bin/docker-entrypoint.sh server
    volumes:
      - ./vault/config.hcl:/vault/config/config.hcl:ro
      - vault_data:/vault/data
      - vault_logs:/vault/logs
    environment:
      VAULT_ADDR: http://127.0.0.1:8200
      VAULT_API_ADDR: http://translog_vault:8200
    healthcheck:
      # "sealed" est un statut normal au démarrage — on teste juste la connectivité
      test: ["CMD", "wget", "-qO-", "--spider", "http://127.0.0.1:8200/v1/sys/health?standbyok=true&sealedcode=200&uninitcode=200"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - translog_net

  # ── API NestJS ────────────────────────────────────────────────────────────
  api:
    build:
      context: ../..                    # racine du repo
      dockerfile: Dockerfile
    image: translog_api:${APP_VERSION:-latest}
    container_name: translog_api
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      NODE_ENV: production
      PORT: "3000"
      WS_PORT: "3001"
      # Databases (via pgbouncer pour RLS correct)
      DATABASE_URL: postgresql://app_runtime:${POSTGRES_APP_RUNTIME_PASSWORD}@pgbouncer:5432/translog
      DATABASE_URL_POOLED: postgresql://app_runtime:${POSTGRES_APP_RUNTIME_PASSWORD}@pgbouncer:5432/translog
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_USE_SSL: "false"
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: ${VAULT_TOKEN}
      PLATFORM_BASE_DOMAIN: ${PLATFORM_BASE_DOMAIN}
      PUBLIC_BASE_DOMAIN:   ${PUBLIC_BASE_DOMAIN}
      PUBLIC_APP_URL:       ${PUBLIC_APP_URL}
      DOMAIN_CHECK_API_KEY: ${DOMAIN_CHECK_API_KEY}
    depends_on:
      pgbouncer:
        condition: service_started
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health/live"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - translog_net

  # ── Frontend Vite build servi par nginx statique ──────────────────────────
  web:
    build:
      context: ../../frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_URL: ${PUBLIC_APP_URL}
        VITE_PLATFORM_BASE_DOMAIN: ${PLATFORM_BASE_DOMAIN}
    image: translog_web:${APP_VERSION:-latest}
    container_name: translog_web
    restart: unless-stopped
    networks:
      - translog_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3

# ─── Networks ─────────────────────────────────────────────────────────────────
networks:
  translog_net:
    name: translog_net
    driver: bridge
  # Overlay swarm existant (Easypanel) — attachable:true vérifié
  # Permet à Caddy d'accéder aux containers gmp_backend, gmp_frontend, etc.
  easypanel-gmp:
    external: true
  # Overlay swarm Easypanel principal (pour accéder au container easypanel UI)
  easypanel:
    external: true

# ─── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  postgres_data:     { name: translog_postgres_data }
  redis_data:        { name: translog_redis_data }
  minio_data:        { name: translog_minio_data }
  vault_data:        { name: translog_vault_data }
  vault_logs:        { name: translog_vault_logs }
  caddy_data:        { name: translog_caddy_data }      # CRITIQUE : backup quotidien
  caddy_config:      { name: translog_caddy_config }
  caddy_logs:        { name: translog_caddy_logs }
  bind9_cache:       { name: translog_bind9_cache }
