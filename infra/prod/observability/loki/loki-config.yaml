# ═════════════════════════════════════════════════════════════════════════════
# Loki — single-binary, filesystem storage, rétention 7 jours
# ═════════════════════════════════════════════════════════════════════════════
# Volumétrie estimée : ~2-3 GB pour 7j (TransLog actuel ~50k requêtes/jour)
# Rétention contrôlée par retention_period + cleanup interval
# ═════════════════════════════════════════════════════════════════════════════

auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096
  log_level: info

common:
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory:  /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

ingester:
  chunk_idle_period: 5m
  chunk_target_size: 1048576   # 1 MB
  max_chunk_age: 1h
  wal:
    enabled: true
    dir: /loki/wal

limits_config:
  reject_old_samples: true
  reject_old_samples_max_age: 168h
  ingestion_rate_mb: 8
  ingestion_burst_size_mb: 16
  retention_period: 168h        # 7 jours
  max_query_series: 5000
  allow_structured_metadata: false

compactor:
  working_directory: /loki/compactor
  retention_enabled: true
  retention_delete_delay: 2h
  retention_delete_worker_count: 50
  delete_request_store: filesystem

ruler:
  storage:
    type: local
    local:
      directory: /loki/rules
  rule_path: /loki/rules-tmp

analytics:
  reporting_enabled: false
