# ═════════════════════════════════════════════════════════════════════════════
# Promtail — collecte logs Docker → Loki
# ═════════════════════════════════════════════════════════════════════════════
# Lit les logs JSON Docker depuis /var/lib/docker/containers/*/*-json.log
# Extrait labels Swarm (service, stack, container_name) pour requêtage par
# tenant logique dans Grafana (ex: {service="translog_api"}).
# ═════════════════════════════════════════════════════════════════════════════

server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: info

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push
    backoff_config:
      min_period: 500ms
      max_period: 5m
      max_retries: 10
    batchwait: 1s
    batchsize: 1048576

scrape_configs:

  # ── Docker container logs (tous les containers du host) ──────────────────
  - job_name: containers
    static_configs:
      - targets: [localhost]
        labels:
          job: containerlogs
          __path__: /var/lib/docker/containers/*/*-json.log

    pipeline_stages:
      # Parse Docker JSON log format : {"log":"...", "stream":"stdout|stderr", "time":"..."}
      - json:
          expressions:
            output: log
            stream: stream
            time:   time
            attrs:  attrs

      # Extrait les attrs Swarm (tag = container metadata)
      - json:
          source: attrs
          expressions:
            tag: tag

      # Tag Swarm format : <container-name>/<task-id>
      # Exemple : translog_api.1.abc123/abc123
      - regex:
          source: tag
          expression: '^(?P<container_name>[^.]+)\.(?P<task_slot>\d+)\.(?P<task_id>[a-z0-9]+)'

      # Stream = stdout|stderr
      - labels:
          stream:
          container_name:

      # Timestamp parse (RFC3339Nano)
      - timestamp:
          source: time
          format: RFC3339Nano

      # Sortie finale = log seul (sans wrapper JSON)
      - output:
          source: output

      # Drop messages trop verbeux (réduit volume Loki)
      # On peut affiner après mesure réelle.
      - drop:
          expression: '^.*health/live.*$'
          drop_counter_reason: noisy_health_probe

  # ── Logs système /var/log/syslog (auth ssh, kernel, cron) ────────────────
  - job_name: system
    static_configs:
      - targets: [localhost]
        labels:
          job: syslog
          __path__: /var/log/syslog

    pipeline_stages:
      - regex:
          expression: '^(?P<timestamp>\w{3}\s+\d+\s\d+:\d+:\d+)\s(?P<host>\S+)\s(?P<process>[^:\[]+)(\[(?P<pid>\d+)\])?:\s(?P<message>.*)$'
      - labels:
          process:
          host:
      - output:
          source: message
