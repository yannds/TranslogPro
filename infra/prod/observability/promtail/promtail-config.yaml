# ═════════════════════════════════════════════════════════════════════════════
# Promtail — collecte logs Docker → Loki
# ═════════════════════════════════════════════════════════════════════════════
# Stratégie v2 (2026-04-27) : utiliser `docker_sd_configs` au lieu de lire les
# fichiers /var/lib/docker/containers/*/*-json.log directement.
#
# Pourquoi le changement :
#   - L'approche file-based dépendait du champ `attrs.tag` dans le JSON Docker,
#     non peuplé par défaut → labels `container_name` toujours vides → toutes
#     les requêtes `{container_name="translog_api"}` de Loki retournaient vide.
#   - `docker_sd_configs` consulte la socket Docker pour découvrir tous les
#     conteneurs avec leur métadata complète (nom, labels Swarm, image…) et
#     lit les logs via Docker API. Plus de parsing tag.
#
# Labels exposés dans Loki :
#   container_name : nom du service Swarm (ex: translog_api). Mappé depuis
#                    com.docker.swarm.service.name. Pour les conteneurs hors
#                    Swarm, ce label est vide.
#   stack          : nom de la stack Swarm (ex: translog, translog-obs).
#   container_full_name : nom complet du conteneur (ex: translog_api.1.abc123).
#   stream         : stdout | stderr.
#
# Sécurité : la socket Docker est montée en READ-ONLY (`:ro`) — Promtail peut
# lire la liste des conteneurs et leurs logs, mais ne peut pas en créer ni en
# tuer. Mode global = 1 instance par nœud, lit la socket locale.
# ═════════════════════════════════════════════════════════════════════════════

server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: info

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push
    backoff_config:
      min_period: 500ms
      max_period: 5m
      max_retries: 10
    batchwait: 1s
    batchsize: 1048576

scrape_configs:

  # ── Docker containers via Docker socket ──────────────────────────────────
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # Nom complet du conteneur (préserve l'info pour debug fin)
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container_full_name'
      # Stream stdout/stderr
      - source_labels: ['__meta_docker_container_log_stream']
        target_label: 'stream'
      # Mappe le nom de service Swarm → label `container_name`
      # (compatibilité ascendante avec les requêtes Loki existantes)
      - source_labels: ['__meta_docker_container_label_com_docker_swarm_service_name']
        target_label: 'container_name'
      # Stack Swarm (ex: translog, translog-obs)
      - source_labels: ['__meta_docker_container_label_com_docker_stack_namespace']
        target_label: 'stack'
      # Pour les conteneurs hors Swarm, fallback sur le nom de conteneur
      - source_labels: ['container_name']
        regex: '^$'
        target_label: 'container_name'
        replacement: 'standalone'
      # Drop tous les autres labels __meta_docker_* (cardinalité)
      - regex: '__meta_docker_.+'
        action: labeldrop
    pipeline_stages:
      # Drop healthchecks bruyants (Caddy + autres)
      - drop:
          expression: '.*GET /health/.*'
          drop_counter_reason: noisy_health_probe

  # ── Logs système /var/log/syslog (auth ssh, kernel, cron) ────────────────
  # Fournit les logs SSH/auth.log à CrowdSec et permet aux dashboards Grafana
  # d'afficher les tentatives de login échouées via Loki.
  - job_name: system
    static_configs:
      - targets: [localhost]
        labels:
          job: syslog
          __path__: /var/log/syslog
    pipeline_stages:
      - regex:
          expression: '^(?P<timestamp>\w{3}\s+\d+\s\d+:\d+:\d+)\s(?P<host>\S+)\s(?P<process>[^:\[]+)(\[(?P<pid>\d+)\])?:\s(?P<message>.*)$'
      - labels:
          process:
          host:
      - output:
          source: message
