# ═════════════════════════════════════════════════════════════════════════════
# Prometheus — config principale TransLog Pro
# ═════════════════════════════════════════════════════════════════════════════
# Scrape jobs :
#   prometheus    — auto-monitoring
#   node          — métriques host (DNS Swarm: tasks.node-exporter)
#   cadvisor      — métriques conteneurs Docker
#   postgres      — postgres-exporter
#   redis         — redis-exporter
#   api           — NestJS /metrics (réseau translog_net)
#   blackbox-http — uptime sous-domaines via blackbox-exporter
# ═════════════════════════════════════════════════════════════════════════════

global:
  scrape_interval:     30s
  evaluation_interval: 30s
  external_labels:
    cluster: translog-prod
    region:  hostinger-paris

scrape_configs:

  # ── Auto-monitoring ──────────────────────────────────────────────────────
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # ── Host metrics (node-exporter, mode global → tasks.* DNS) ──────────────
  - job_name: 'node'
    dns_sd_configs:
      - names: ['tasks.node-exporter']
        type: 'A'
        port: 9100
    relabel_configs:
      - source_labels: [__address__]
        target_label:  instance
        regex:         '([^:]+):.*'
        replacement:   '$1'

  # ── Container metrics (cAdvisor, mode global) ────────────────────────────
  - job_name: 'cadvisor'
    dns_sd_configs:
      - names: ['tasks.cadvisor']
        type: 'A'
        port: 8080
    metric_relabel_configs:
      # Drop very high-cardinality labels which inflate disk usage
      - source_labels: [__name__]
        regex: 'container_(network_tcp_usage_total|network_advance_tcp_stats_total|tasks_state)'
        action: drop

  # ── Postgres ─────────────────────────────────────────────────────────────
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']
        labels:
          db: 'translog'

  # ── Redis ────────────────────────────────────────────────────────────────
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']

  # ── API NestJS (/metrics) ────────────────────────────────────────────────
  # L'API expose /metrics en plain HTTP sur :3000, accessible via translog_net.
  # Pas de label scrape, exposition directe (sans préfixe /api).
  - job_name: 'translog-api'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['api:3000']

  # ── Caddy admin API (métriques internes) ─────────────────────────────────
  # Caddy 2.x expose /metrics sur le port admin (2019). Le réseau translog_net
  # nous y donne accès. Si admin était bind sur 0.0.0.0:2019 dans Caddyfile.
  - job_name: 'caddy'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['caddy:2019']

  # ── CrowdSec — métriques de détection (Lot 2) ────────────────────────────
  # L'agent expose ses métriques sur :6060/metrics : nb d'événements, scenarios
  # déclenchés, décisions actives (incluant simulées), top IPs, sources de logs
  # acquises, etc. Consommé par le dashboard Grafana 'Sécurité'.
  - job_name: 'crowdsec'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['crowdsec:6060']

  # ── Blackbox uptime probes (sous-domaines publics) ───────────────────────
  - job_name: 'blackbox-http'
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
        - https://translog.dsyann.info
        - https://admin.translog.dsyann.info
        - https://api.translog.dsyann.info
        - https://app.dsyann.info
        - https://api.dsyann.info
        - https://panel.dsyann.info
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115
