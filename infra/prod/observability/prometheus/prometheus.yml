# ═════════════════════════════════════════════════════════════════════════════
# Prometheus — config principale TransLog Pro
# ═════════════════════════════════════════════════════════════════════════════
# Scrape jobs :
#   prometheus    — auto-monitoring
#   node          — métriques host (mode global → 1 task / node)
#   cadvisor      — métriques conteneurs Docker (mode global)
#   postgres      — postgres-exporter
#   redis         — redis-exporter
#   translog-api  — NestJS /metrics (réseau translog_net)
#   caddy         — Caddy admin API metrics
#   crowdsec      — CrowdSec agent metrics (Lot 2)
#   blackbox-http — uptime sous-domaines via blackbox-exporter
#
# RÈGLE : tous les targets utilisent le NOM COMPLET de service Swarm
# `<stack>_<service>:<port>` au lieu de l'alias court.
# Pourquoi : Caddy + Easypanel ont chacun leurs propres services (`gmp_grafana`,
# `gmp_prometheus`...), et les alias courts résolvent aléatoirement entre les
# stacks quand Prometheus est sur plusieurs réseaux overlay (incident 2026-04-26).
# ═════════════════════════════════════════════════════════════════════════════

global:
  scrape_interval:     30s
  evaluation_interval: 30s
  external_labels:
    cluster: translog-prod
    region:  hostinger-paris

scrape_configs:

  # ── Auto-monitoring ──────────────────────────────────────────────────────
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # ── Host metrics (node-exporter, mode global) ────────────────────────────
  # Avec mode:global + 1 nœud, le VIP du service résout vers la seule task.
  - job_name: 'node'
    static_configs:
      - targets: ['translog-obs_node-exporter:9100']
        labels:
          instance: 'srv1128228'

  # ── Container metrics (cAdvisor, mode global) ────────────────────────────
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['translog-obs_cadvisor:8080']
        labels:
          instance: 'srv1128228'
    metric_relabel_configs:
      # Drop very high-cardinality labels which inflate disk usage
      - source_labels: [__name__]
        regex: 'container_(network_tcp_usage_total|network_advance_tcp_stats_total|tasks_state)'
        action: drop

  # ── Postgres ─────────────────────────────────────────────────────────────
  - job_name: 'postgres'
    static_configs:
      - targets: ['translog-obs_postgres-exporter:9187']
        labels:
          db: 'translog'

  # ── Redis ────────────────────────────────────────────────────────────────
  - job_name: 'redis'
    static_configs:
      - targets: ['translog-obs_redis-exporter:9121']

  # ── API NestJS (/metrics) ────────────────────────────────────────────────
  # L'API expose /metrics en plain HTTP sur :3000, accessible via translog_net.
  # Pas de label scrape, exposition directe (sans préfixe /api).
  - job_name: 'translog-api'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['translog_api:3000']

  # ── Caddy admin API (métriques internes) ─────────────────────────────────
  # Caddy 2.x expose /metrics sur le port admin (2019).
  - job_name: 'caddy'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['translog_caddy:2019']

  # ── CrowdSec — métriques de détection (Lot 2) ────────────────────────────
  # L'agent expose ses métriques sur :6060/metrics : nb d'événements, scenarios
  # déclenchés, décisions actives (incluant simulées), top IPs, sources de logs
  # acquises, etc. Consommé par le dashboard Grafana 'Sécurité'.
  - job_name: 'crowdsec'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['translog-obs_crowdsec:6060']

  # ── Blackbox uptime probes (sous-domaines publics) ───────────────────────
  - job_name: 'blackbox-http'
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
        - https://translog.dsyann.info
        - https://admin.translog.dsyann.info
        - https://api.translog.dsyann.info
        - https://app.dsyann.info
        - https://api.dsyann.info
        - https://panel.dsyann.info
        - https://grafana.translog.dsyann.info
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: translog-obs_blackbox-exporter:9115
