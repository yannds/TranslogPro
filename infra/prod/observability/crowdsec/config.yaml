# ═════════════════════════════════════════════════════════════════════════════
# CrowdSec — Configuration principale
# ═════════════════════════════════════════════════════════════════════════════
# L'agent et la LAPI tournent dans le même container (mode simple).
# La LAPI écoute sur :8080 en interne (réseau translog_obs_net) — Caddy
# bouncer s'y connecte pour récupérer les décisions.
# Les métriques Prometheus sont exposées sur :6060/metrics.
# ═════════════════════════════════════════════════════════════════════════════

common:
  daemonize: true
  log_media: stdout
  log_level: info
  working_dir: /var/lib/crowdsec/data/

config_paths:
  config_dir: /etc/crowdsec/
  data_dir: /var/lib/crowdsec/data/
  simulation_path: /etc/crowdsec/simulation.yaml
  hub_dir: /etc/crowdsec/hub/
  index_path: /etc/crowdsec/hub/.index.json
  notification_dir: /etc/crowdsec/notifications/
  plugin_dir: /usr/local/lib/crowdsec/plugins/

crowdsec_service:
  acquisition_path: /etc/crowdsec/acquis.yaml
  parser_routines: 1
  buckets_routines: 1
  output_routines: 1

cscli:
  output: human
  hub_branch: master

db_config:
  log_level: info
  type: sqlite
  db_path: /var/lib/crowdsec/data/crowdsec.db
  flush:
    max_items: 5000
    max_age: 7d

api:
  client:
    insecure_skip_verify: false
    credentials_path: /etc/crowdsec/local_api_credentials.yaml
  server:
    log_level: info
    listen_uri: 0.0.0.0:8080
    profiles_path: /etc/crowdsec/profiles.yaml
    use_forwarded_for_headers: true
    online_client:
      credentials_path: /etc/crowdsec/online_api_credentials.yaml

prometheus:
  enabled: true
  level: full
  listen_addr: 0.0.0.0
  listen_port: 6060
