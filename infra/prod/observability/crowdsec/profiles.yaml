# ═════════════════════════════════════════════════════════════════════════════
# CrowdSec — Profiles de décisions
# ═════════════════════════════════════════════════════════════════════════════
# Détermine quoi faire quand un scenario match (type de remediation, durée).
#
# IMPORTANT : la simulation est gérée dans `simulation.yaml` (pas ici).
# Le champ `simulation:` n'existe PAS dans le schéma ProfileCfg — l'avoir
# mis ici faisait crasher l'agent au boot avec :
#   "while decoding profiles.yaml: field simulation not found in type
#    csconfig.ProfileCfg" (incident 2026-04-27).
#
# Pour activer/désactiver la simulation par scenario, utiliser :
#   cscli simulation disable <scenario>   (= active le blocage réel)
#   cscli simulation enable  <scenario>   (= retour en observation)
# Ces commandes editent simulation.yaml runtime sans toucher à ce fichier.
# ═════════════════════════════════════════════════════════════════════════════

name: default_ip_remediation
filters:
  - Alert.Remediation == true && Alert.GetScope() == "Ip"
decisions:
  - type: ban
    duration: 4h

# Pas de notification email/slack/etc. en simulation — uniquement les logs +
# métriques Prometheus consommées par Grafana.
on_success: break
