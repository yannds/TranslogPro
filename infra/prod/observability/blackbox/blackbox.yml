# ═════════════════════════════════════════════════════════════════════════════
# Blackbox exporter — probes HTTP pour uptime sous-domaines
# ═════════════════════════════════════════════════════════════════════════════
# Modules :
#   http_2xx  — probe HTTPS standard, accepte 200-399
#   http_4xx  — probe d'erreur intentionnelle (catch-all 421 par exemple)
# ═════════════════════════════════════════════════════════════════════════════

modules:

  http_2xx:
    prober: http
    timeout: 10s
    http:
      method: GET
      valid_http_versions: [HTTP/1.1, HTTP/2.0]
      valid_status_codes: [200, 301, 302, 304, 404]
      follow_redirects: true
      preferred_ip_protocol: ip4
      fail_if_ssl: false
      fail_if_not_ssl: true
      tls_config:
        insecure_skip_verify: false

  http_4xx:
    prober: http
    timeout: 10s
    http:
      method: GET
      valid_status_codes: [400, 401, 403, 404, 421]
      preferred_ip_protocol: ip4

  tcp_connect:
    prober: tcp
    timeout: 5s
