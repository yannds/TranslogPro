// ═════════════════════════════════════════════════════════════════════════════
// BIND9 — DNS authoritative pour translog.dsyann.info
//
// Expose la zone publiquement (port 53) pour que les resolvers Internet
// résolvent *.translog.dsyann.info, ET accepte les mises à jour TSIG-signées
// depuis Caddy (container translog_caddy) pour créer les TXT _acme-challenge.
// ═════════════════════════════════════════════════════════════════════════════

options {
    directory        "/var/cache/bind";
    pid-file         "/var/run/named/named.pid";
    listen-on port 53 { any; };
    listen-on-v6 port 53 { any; };

    // Authoritative seul — pas de récursion (empêche amplification attacks)
    recursion          no;
    allow-recursion    { none; };
    allow-query        { any; };         // réponses authoritative acceptées de partout
    allow-transfer     { none; };        // pas de AXFR exposé

    // DNSSEC validation désactivé (authoritative uniquement, on ne résout pas)
    dnssec-validation  no;

    // Sécu anti-cache-poisoning
    version            "TransLog DNS";   // cache version réelle BIND
    hostname           none;

    // Limite requêtes réponses (anti-DDoS DNS)
    rate-limit {
        responses-per-second 10;
        window               5;
    };
};

// ─── TSIG key pour updates ACME DNS-01 (Caddy → BIND) ────────────────────────
// La clé est générée par scripts/02-gen-secrets.sh et injectée ici
// via sed au premier boot. NE JAMAIS COMMITER la vraie valeur.
include "/var/lib/bind/tsig.key";

// ─── Zone translog.dsyann.info (master authoritative) ────────────────────────
zone "translog.dsyann.info" {
    type       master;
    file       "/var/lib/bind/translog.db";

    // ─── DNSSEC inline-signing (BIND9 9.20+ syntax) ──────────────────────────
    // dnssec-policy "default" génère et rotate automatiquement KSK + ZSK
    // (ECDSAP256SHA256 par défaut). Les keys sont stockées dans
    // /var/cache/bind (volume Docker translog_bind9_cache, persistant).
    //
    // ⚠️  La chaîne de confiance est INCOMPLÈTE tant que le DS record n'est
    // pas publié chez le registrar parent (LWS) — voir docs/MANUEL_OPS.md §8.7.
    // Le serveur signe quand même les RRSIG, simplement les resolvers
    // DNSSEC-aware verront "insecure" au lieu de "secure".
    inline-signing yes;
    dnssec-policy  "default";
    key-directory  "/var/cache/bind";

    // Seule la TSIG key translog-acme. peut créer/supprimer les TXT
    // _acme-challenge.*.translog.dsyann.info. Tout le reste est read-only.
    update-policy {
        grant translog-acme. subdomain _acme-challenge.translog.dsyann.info. TXT;
    };

    notify     no;
};

// ─── Logging structuré ────────────────────────────────────────────────────────
logging {
    channel stderr {
        stderr;
        severity info;
        print-time yes;
    };
    category default    { stderr; };
    category update     { stderr; };     // trace les TSIG updates (audit cert renew)
    category security   { stderr; };
    category queries    { null; };       // off par défaut (bruyant), activer en debug
};
